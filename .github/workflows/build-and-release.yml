name: Build and Publish Pacman Repo

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Optional package selector (.id or .aur from packages.json)'
        required: false
        default: ''
      publish:
        description: 'Run publish stage (set false for bulk rebuild dispatches)'
        required: false
        default: 'true'
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build configured packages
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_FILTER: ${{ github.event.inputs.package || '' }}
        run: |
          chmod +x scripts/*.sh
          scripts/build-packages.sh "${{ matrix.arch }}" "./dist/${{ matrix.arch }}" "${PACKAGE_FILTER}"

      - name: Pack build output
        run: |
          tar -C "dist/${{ matrix.arch }}" -czf "dist/packages-${{ matrix.arch }}.tar.gz" .

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: packages-${{ matrix.arch }}
          path: dist/packages-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish repo assets (${{ matrix.arch }})
    if: ${{ github.event.inputs.publish != 'false' }}
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: pacman-publish-${{ github.repository }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: packages-${{ matrix.arch }}
          path: dist

      - name: Unpack build output
        run: |
          mkdir -p "dist/${{ matrix.arch }}"
          tar -C "dist/${{ matrix.arch }}" -xzf "dist/packages-${{ matrix.arch }}.tar.gz"

      - name: Publish/update release-backed repo
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GPG_PRIVATE_KEY_B64: ${{ secrets.PACMAN_GPG_PRIVATE_KEY_B64 }}
          GPG_KEY_ID: ${{ secrets.PACMAN_GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.PACMAN_GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/*.sh
          scripts/publish-release.sh "${{ matrix.arch }}" "dist/${{ matrix.arch }}"
